<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Login — Parkwise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@500;650;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="app-shell">
      <header class="topbar">
        <div class="container">
          <div class="topbar-inner">
            <a class="brand" href="./index.html">
              <span class="brand-mark" aria-hidden="true"></span>
              <span>Parkwise</span>
            </a>

            <nav class="nav" aria-label="Primary">
              <a href="./index.html">Home</a>
              <a href="./lots.html">Lots</a>
              <a href="./bookings.html">Bookings</a>
              <a href="./vehicles.html">Vehicles</a>
              <a href="./billing.html">Billing</a>
            </nav>
          </div>
        </div>
      </header>

      <main id="main">
        <section class="section">
          <div class="container container--narrow">
            <div class="section-head">
              <h1 class="section-title">Welcome back</h1>
              <p class="section-sub">Log in to manage your bookings and profile.</p>
            </div>

            <div class="card">
              <div class="card-body">
                <form data-auth-login-form>
                  <div class="field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" class="control" required />
                  </div>
                  <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" class="control" required />
                  </div>
                  <div class="field margin-top-8">
                    <button type="submit" class="btn btn--primary btn--block">Login</button>
                  </div>
                  <div class="field margin-top-18">
                    <p class="card-meta">
                      Don’t have an account? <a href="./signup.html">Sign up</a>
                    </p>
                  </div>
                  <div class="field margin-top-10">
                    <div data-auth-message class="card-meta"></div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="container">
          <div class="footer-inner">
            <small>Parkwise</small>
            <small class="mono">User: demo-user</small>
          </div>
        </div>
      </footer>
    </div>

    <script type="module">
      import { initAuthNav, initLoginForm } from "./js/lib/auth.js";
      initAuthNav();
      initLoginForm();
    </script>
  </body>
</html>
