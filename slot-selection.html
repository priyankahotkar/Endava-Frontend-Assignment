<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Choose slot — Parkwise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@500;650;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="app-shell">
      <header class="topbar">
        <div class="container">
          <div class="topbar-inner">
            <a class="brand" href="./index.html"><span class="brand-mark" aria-hidden="true"></span><span>Parkwise</span></a>
            <nav class="nav" aria-label="Primary">
              <a href="./index.html">Home</a>
              <a href="./lots.html">Lots</a>
              <a href="./bookings.html">Bookings</a>
              <a href="./vehicles.html">Vehicles</a>
              <a href="./billing.html">Billing</a>
            </nav>
          </div>
        </div>
      </header>

      <main id="main">
        <section class="section">
          <div class="container">
            <p class="section-sub"><a href="./lots.html" class="btn btn--small btn--ghost">← Back to lots</a></p>
            <div class="section-head">
              <h1 class="section-title" id="slot-selection-lot-name">Choose slot</h1>
              <p class="section-sub" id="slot-selection-lot-address"></p>
            </div>

            <div class="card margin-bottom-18">
              <div class="card-body">
                <h2 class="card-title">Select your vehicle</h2>
                <p class="card-meta">Choose how you want to select your vehicle.</p>
                
                <div class="form" data-vehicle-selection-mode>
                  <div class="field">
                    <label class="control-radio">
                      <input type="radio" name="vehicle-selection-mode" value="quick" checked>
                      <span class="radio-mark"></span>
                      <span class="radio-label">Quick selection - Choose vehicle type</span>
                    </label>
                  </div>
                  <div class="field">
                    <label class="control-radio">
                      <input type="radio" name="vehicle-selection-mode" value="saved">
                      <span class="radio-mark"></span>
                      <span class="radio-label">Select from my saved vehicles</span>
                    </label>
                  </div>
                </div>

                <div class="form margin-top-16" data-quick-selection>
                  <div class="form-row">
                    <div class="field">
                      <label for="vehicle-type">Vehicle type</label>
                      <select id="vehicle-type" name="vehicle-type" class="control" data-vehicle-type-select>
                        <option value="Car">Car</option>
                        <option value="Bike">Bike</option>
                        <option value="EV">EV</option>
                      </select>
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="field">
                      <label for="quick-plate">License plate (optional)</label>
                      <input type="text" id="quick-plate" name="quick-plate" class="control" placeholder="e.g. AB-123-CD" data-quick-plate>
                    </div>
                    <div class="field">
                      <label for="quick-nickname">Nickname (optional)</label>
                      <input type="text" id="quick-nickname" name="quick-nickname" class="control" placeholder="e.g. My Red Car" data-quick-nickname>
                    </div>
                  </div>
                </div>

                <div class="form margin-top-16 display-none" data-saved-vehicles>
                  <div class="field">
                    <label for="saved-vehicle-select">Select vehicle</label>
                    <select id="saved-vehicle-select" name="saved-vehicle-select" class="control" data-saved-vehicle-select>
                      <option value="">Choose a vehicle...</option>
                      <!-- Saved vehicles will be populated by JS -->
                    </select>
                  </div>
                  <p class="card-meta margin-top-8">
                    <a href="./vehicles.html" class="btn btn--small btn--ghost">Add new vehicle</a>
                  </p>
                </div>
              </div>
            </div>

            <div class="card margin-bottom-18">
              <div class="card-body">
                <h2 class="card-title">Available slots</h2>
                <p class="card-meta">Select a slot for your vehicle type.</p>
                <div class="slot-grid" data-slot-list aria-label="Available slots"></div>
              </div>
            </div>

            <div class="card margin-bottom-18">
              <div class="card-body">
                <h2 class="card-title">Duration &amp; fare</h2>
                <div class="form-row">
                  <div class="field">
                    <label for="duration">Hours</label>
                    <select id="duration" name="duration" class="control" data-duration-select>
                      <option value="1">1 hour</option>
                      <option value="2">2 hours</option>
                      <option value="3" selected>3 hours</option>
                      <option value="4">4 hours</option>
                      <option value="8">8 hours</option>
                    </select>
                  </div>
                  <div class="field">
                    <label>Total fare</label>
                    <div class="mono fare-display" id="fare-display">$0.00</div>
                  </div>
                </div>
                <div class="card-row margin-top-14">
                  <button type="button" class="btn btn--primary btn--block" data-action="proceed-to-pay" disabled>Proceed to pay</button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="container">
          <div class="footer-inner">
            <small>Parkwise</small>
            <small class="mono">User: demo-user</small>
          </div>
        </div>
      </footer>
    </div>
    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/slot-selection.js"></script>
  </body>
</html>
